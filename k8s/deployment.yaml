---
# k8s/deployment.yaml
# Template variables (substituted by envsubst in the Jenkinsfile before applying):
#   $IMAGE_NAME     – full image path + tag, e.g. registry.example.com/app:abc1234
#   $APP_NAMESPACE  – target namespace
#   $APP_NAME       – application / deployment name

apiVersion: apps/v1
kind: Deployment
metadata:
  name: $APP_NAME
  namespace: $APP_NAMESPACE
  labels:
    app: $APP_NAME
    managed-by: jenkins
spec:
  # Start with 2 replicas; HPA (see hpa.yaml) will scale further.
  replicas: 2
  selector:
    matchLabels:
      app: $APP_NAME
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1         # allow 1 extra pod during rollout
      maxUnavailable: 0   # never reduce below desired count (zero-downtime)
  template:
    metadata:
      labels:
        app: $APP_NAME
      annotations:
        # Force a pod restart whenever the image tag changes (even if name stays the same)
        rollme: "$IMAGE_NAME"
    spec:
      # --------------- Security hardening ---------------
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      # Prevent the service account token from being auto-mounted
      # if the app does not need to call the K8s API.
      automountServiceAccountToken: false

      containers:
        - name: $APP_NAME
          image: $IMAGE_NAME
          imagePullPolicy: Always   # Always pull to pick up the latest tag

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # --------------- Resource limits ---------------
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # --------------- Health probes ---------------
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          # --------------- Environment / Config ---------------
          envFrom:
            - configMapRef:
                name: $APP_NAME-config
            - secretRef:
                name: $APP_NAME-secrets
                optional: true   # allow deployment when secret does not yet exist in dev

          # --------------- Container security ---------------
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # Writable tmp dir when root FS is read-only
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      # Use imagePullSecret if your registry is private
      imagePullSecrets:
        - name: registry-credentials
