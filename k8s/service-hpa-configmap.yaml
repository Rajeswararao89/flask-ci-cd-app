---
# k8s/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: $APP_NAME
  namespace: $APP_NAMESPACE
  labels:
    app: $APP_NAME
spec:
  selector:
    app: $APP_NAME
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP   # Expose externally via an Ingress; never use LoadBalancer in prod directly.

---
# k8s/hpa.yaml – Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: $APP_NAME-hpa
  namespace: $APP_NAMESPACE
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: $APP_NAME
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# k8s/configmap.yaml – Non-sensitive runtime configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: $APP_NAME-config
  namespace: $APP_NAMESPACE
data:
  APP_ENV: "$APP_NAMESPACE"
  LOG_LEVEL: "info"
  # Add application-specific env vars here.
  # Sensitive values (passwords, API keys) belong in a Kubernetes Secret,
  # NOT in this ConfigMap.

---
# k8s/ingress.yaml – Expose the service to external traffic
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: $APP_NAME-ingress
  namespace: $APP_NAMESPACE
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "$APP_NAME.$APP_NAMESPACE.example.com"
      secretName: "$APP_NAME-tls"
  rules:
    - host: "$APP_NAME.$APP_NAMESPACE.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: $APP_NAME
                port:
                  number: 80
